<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neshan Map</title>

    <link rel="stylesheet"
          href="https://static.neshan.org/sdk/mapboxgl/v1.13.2/neshan-sdk/v1.1.5/index.css" />
    <script src="https://static.neshan.org/sdk/mapboxgl/v1.13.2/neshan-sdk/v1.1.5/index.js"></script>

    <style>
        body {
          margin: 0;
          padding: 0;
          height: 100vh;
          width: 100vw;
        }
        #map {
          height: 100%;
          width: 100%;
        }
    </style>
</head>
<body>
<div id="map"></div>

<script>
    // Store marker instances for later manipulation
    window.neshanMarkers = {};
    
    // Track if this is the first location update
    window.userLocationFirstUpdate = true;

    // Location picker communication bridge
    function sendLocationToFlutter(lat, lng) {
      const data = JSON.stringify({
        type: 'locationChanged',
        lat: lat,
        lng: lng
      });

      // Mobile: Use JavaScript channel (webview_flutter)
      // The channel name 'locationChanged' becomes available as a global function
      if (typeof locationChanged !== 'undefined') {
        locationChanged.postMessage(data);
      } else if (window.chrome && window.chrome.webview) {
        // Alternative for some WebView implementations
        window.chrome.webview.postMessage(data);
      } else {
        // Web: Use postMessage for iframe communication
        // Parse back to object for postMessage
        window.parent.postMessage(JSON.parse(data), '*');
      }
    }

    // Marker tap communication bridge
    function sendMarkerTapToFlutter(markerId) {
      const data = JSON.stringify({
        type: 'markerTapped',
        markerId: markerId
      });

      // Mobile: Use JavaScript channel (webview_flutter)
      if (typeof markerTapped !== 'undefined') {
        markerTapped.postMessage(data);
      } else if (window.chrome && window.chrome.webview) {
        window.chrome.webview.postMessage(data);
      } else {
        // Web: Use postMessage for iframe communication
        window.parent.postMessage(JSON.parse(data), '*');
      }
    }

    // Function to initialize user location layers
    function initializeUserLocationLayers() {
      if (!window.neshanMap) return;
      
      const map = window.neshanMap;
      
      // Check if source already exists
      if (map.getSource('user-location')) {
        return; // Already initialized
      }
      
      // Add source for user location
      map.addSource('user-location', {
        type: 'geojson',
        data: {
          type: 'FeatureCollection',
          features: []
        }
      });
      
      // Add user location dot layer (blue dot with white border)
      map.addLayer({
        id: 'user-location-dot',
        type: 'circle',
        source: 'user-location',
        filter: ['==', ['get', 'type'], 'dot'],
        paint: {
          'circle-radius': 8,
          'circle-color': '#4285F4',
          'circle-stroke-width': 2,
          'circle-stroke-color': '#FFFFFF'
        }
      });
    }
    
    // Function to update user location (called from Flutter)
    window.updateUserLocation = function(lat, lng) {
      if (!window.neshanMap) return;
      
      const map = window.neshanMap;
      
      // Make sure layers are initialized
      if (!map.getSource('user-location')) {
        initializeUserLocationLayers();
      }
      
      // Update source data
      const features = [
        {
          type: 'Feature',
          properties: { type: 'dot' },
          geometry: { type: 'Point', coordinates: [lng, lat] }
        }
      ];
      
      map.getSource('user-location').setData({
        type: 'FeatureCollection',
        features: features
      });
      
      // Only move map on first location update
      if (window.userLocationFirstUpdate) {
        window.userLocationFirstUpdate = false;
        map.flyTo({
          center: [lng, lat],
          zoom: Math.max(map.getZoom(), 15), // Ensure minimum zoom of 15
          duration: 1000
        });
      }
      // Subsequent updates only update the marker position, not the map center
    };

    // Initialize markers on the map
    function initializeMarkers(markersData) {
      // Clear existing markers
      Object.values(window.neshanMarkers).forEach(marker => marker.remove());
      window.neshanMarkers = {};
      
      // Create new markers
      markersData.forEach(markerData => {
        const marker = new nmp_mapboxgl.Marker({
          color: markerData.color || undefined,
          draggable: markerData.draggable || false
        })
        .setLngLat([markerData.lng, markerData.lat])
        .addTo(window.neshanMap);
        
        // Add click listener
        marker.getElement().addEventListener('click', function() {
          sendMarkerTapToFlutter(markerData.id);
        });
        
        // Optional: Add popup if title exists
        if (markerData.title) {
          const popup = new nmp_mapboxgl.Popup({ offset: 25 })
            .setText(markerData.title);
          marker.setPopup(popup);
        }
        
        window.neshanMarkers[markerData.id] = marker;
      });
    }

    // Prewarm shared resources for faster initialization
    if (typeof nmp_mapboxgl !== 'undefined' && nmp_mapboxgl.prewarm) {
      nmp_mapboxgl.prewarm();
    }

    // Wait for configuration to be injected from Flutter
    function initializeMap() {
      const config = window.neshanMapConfig;
      if (!config || !config.mapKey) {
        console.error('NeshanMap: Configuration not found. Make sure mapKey is provided.');
        return;
      }
      
      const map = new nmp_mapboxgl.Map({
      mapType: nmp_mapboxgl.Map.mapTypes[config.mapType],
      container: "map",
      center: config.center,
      zoom: config.zoom,
      pitch: 0,
      minZoom: config.minZoom,
      maxZoom: config.maxZoom,
      trackResize: true,
      mapKey: config.mapKey,
      poi: config.poi,
      traffic: config.traffic,
      mapTypeControllerOptions: {
        show: false,
        position: 'bottom-left'
      }
    });
    
    window.neshanMap = map;

      // Listen to map movement events
      let moveEndTimeout;
      map.on('moveend', function() {
        const center = map.getCenter();
        sendLocationToFlutter(center.lat, center.lng);
      });

      // Also send location on initial load
      map.on('load', function() {
        const center = map.getCenter();
        sendLocationToFlutter(center.lat, center.lng);
        
        // Initialize markers after map is loaded
        if (config.markers && config.markers.length > 0) {
          initializeMarkers(config.markers);
        }
        
        // Initialize user location layers
        initializeUserLocationLayers();
      });
    }
    
    // Listen for commands from Flutter
    window.addEventListener('message', function(event) {
      const map = window.neshanMap;
      if (event.data && event.data.type === 'updateLocation') {
        const lat = event.data.lat;
        const lng = event.data.lng;
        const zoom = event.data.zoom;
        
        if (map && typeof map.flyTo === 'function') {
          map.flyTo({
            center: [lng, lat],
            zoom: zoom !== undefined ? zoom : map.getZoom()
          });
        }
      } else if (event.data && event.data.type === 'setZoom') {
        const zoom = event.data.zoom;
        
        if (map && typeof map.flyTo === 'function') {
          map.flyTo({
            zoom: zoom
          });
        }
      } else if (event.data && event.data.type === 'getCurrentLocation') {
        // Handle getCurrentLocation request (web only)
        if (map && typeof map.getCenter === 'function') {
          const center = map.getCenter();
          const response = {
            type: 'getCurrentLocationResponse',
            requestId: event.data.requestId,
            lat: center.lat,
            lng: center.lng
          };
          window.parent.postMessage(response, '*');
        }
      } else if (event.data && event.data.type === 'getCurrentZoom') {
        // Handle getCurrentZoom request (web only)
        if (map && typeof map.getZoom === 'function') {
          const zoom = map.getZoom();
          const response = {
            type: 'getCurrentZoomResponse',
            requestId: event.data.requestId,
            zoom: zoom
          };
          window.parent.postMessage(response, '*');
        }
      } else if (event.data && event.data.type === 'fitBounds') {
        // Handle fitBounds request
        if (map && typeof map.fitBounds === 'function') {
          map.fitBounds(
            [[event.data.west, event.data.south], [event.data.east, event.data.north]],
            { padding: 50 }
          );
        }
      } else if (event.data && event.data.type === 'initializeMap') {
        // Handle initialization from Flutter (web fallback)
        const config = event.data.config;
        if (config && config.mapKey) {
          window.neshanMapConfig = config;
          if (typeof initializeMap === 'function') {
            initializeMap();
          }
        }
      } else if (event.data && event.data.type === 'addMarker') {
        // Handle adding a single marker dynamically
        const markerData = event.data.marker;
        if (map && markerData) {
          const marker = new nmp_mapboxgl.Marker({
            color: markerData.color || undefined,
            draggable: markerData.draggable || false
          })
          .setLngLat([markerData.lng, markerData.lat])
          .addTo(map);
          
          marker.getElement().addEventListener('click', function() {
            sendMarkerTapToFlutter(markerData.id);
          });
          
          if (markerData.title) {
            const popup = new nmp_mapboxgl.Popup({ offset: 25 })
              .setText(markerData.title);
            marker.setPopup(popup);
          }
          
          window.neshanMarkers[markerData.id] = marker;
        }
      } else if (event.data && event.data.type === 'removeMarker') {
        // Handle removing a marker by ID
        const markerId = event.data.markerId;
        if (window.neshanMarkers[markerId]) {
          window.neshanMarkers[markerId].remove();
          delete window.neshanMarkers[markerId];
        }
      } else if (event.data && event.data.type === 'updateMarkers') {
        // Handle updating all markers
        const markersData = event.data.markers;
        if (markersData) {
          initializeMarkers(markersData);
        }
      } else if (event.data && event.data.type === 'clearMarkers') {
        // Handle clearing all markers
        Object.values(window.neshanMarkers).forEach(marker => marker.remove());
        window.neshanMarkers = {};
      } else if (event.data && event.data.type === 'updateUserLocation') {
        // Handle user location updates from Flutter
        window.updateUserLocation(
          event.data.lat,
          event.data.lng
        );
      } else if (event.data && event.data.type === 'resetUserLocationFirstUpdate') {
        // Reset the first update flag
        window.userLocationFirstUpdate = true;
      }
    });
    
    // Map initialization is triggered from Flutter after configuration is injected
    // Do not call initializeMap() automatically - wait for Flutter to call it
</script>
</body>
</html>
